name: Build Firmware

on:
  push:
    branches: [main]
    paths: ['firmware/**']
  pull_request:
    branches: [main]
    paths: ['firmware/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware
        run: |
          . /opt/esp/idf/export.sh
          idf.py reconfigure
          idf.py set-target esp32c6
          idf.py build
      - name: Archive firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: firmware/build/*.bin
